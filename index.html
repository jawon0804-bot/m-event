<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M-Event</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy:  #1e3a5f; --navy2: #2a4f7c;
  --red:   #dc2626; --yellow: #d97706; --green: #16a34a; --blue: #2563eb;
  --gray0: #f9fafb; --gray1: #f3f4f6; --gray2: #e5e7eb;
  --gray3: #9ca3af; --gray4: #6b7280; --gray5: #374151;
  --text:  #111827;
}
body { font-family: "Apple SD Gothic Neo","맑은 고딕",sans-serif; background: var(--gray0); color: var(--text); }

/* ── 로그인 ── */
#login-screen {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; background: var(--navy);
}
.login-box {
  background: #fff; border-radius: 12px; padding: 40px 36px;
  width: 360px; box-shadow: 0 20px 60px rgba(0,0,0,.3);
}
.login-box .logo { font-size: 28px; margin-bottom: 4px; }
.login-box h1   { font-size: 20px; color: var(--navy); margin-bottom: 4px; }
.login-box p    { font-size: 13px; color: var(--gray3); margin-bottom: 28px; }
.login-box label { font-size: 12px; color: var(--gray4); font-weight: 600; display: block; margin-bottom: 4px; }
.login-box input {
  width: 100%; border: 1px solid var(--gray2); border-radius: 6px;
  padding: 10px 14px; font-size: 14px; margin-bottom: 16px; outline: none; transition: border .15s;
}
.login-box input:focus { border-color: var(--navy2); }
.login-btn {
  width: 100%; background: var(--navy); color: #fff; border: none;
  border-radius: 6px; padding: 12px; font-size: 15px; font-weight: 600;
  cursor: pointer; transition: background .15s; margin-top: 4px;
}
.login-btn:hover { background: var(--navy2); }
.login-error { color: var(--red); font-size: 13px; margin-top: 10px; text-align: center; min-height: 20px; }

/* ── 앱 ── */
#app { display: none; flex-direction: column; min-height: 100vh; }

.header {
  background: var(--navy); color: #fff; padding: 0 24px;
  display: flex; align-items: center; height: 56px; gap: 16px;
  position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,.2);
}
.header h1    { font-size: 22px; font-weight: 800; flex: 1; letter-spacing: -0.5px; }
.header .user { font-size: 11px; color: rgba(255,255,255,.6); }
.logout-btn { display: none; }
.hidden-logout-btn {
  background: rgba(255,255,255,.3); color: transparent; border: none;
  width: 4px; height: 32px; padding: 0 !important; border-radius: 2px;
  cursor: pointer; transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
  overflow: hidden; display: flex; align-items: center; justify-content: center; gap: 8px; flex-shrink: 0;
}
.hidden-logout-btn span, .hidden-logout-btn i { opacity: 0; transition: opacity 0.2s ease; white-space: nowrap; }
.hidden-logout-btn:hover {
  background: #ef4444; color: white;
  width: 105px; height: 32px; padding: 0 15px !important; border-radius: 6px;
}
.hidden-logout-btn:hover span, .hidden-logout-btn:hover i {
  opacity: 1; transition-delay: 0.15s;
}

/* ── 메인 탭 (이벤트/엑셀/사진) ── */
.main-tabs {
  background: var(--navy2); display: flex; padding: 0 24px;
  position: sticky; top: 52px; z-index: 99;
}
.main-tab {
  padding: 12px 20px; font-size: 14px; font-weight: 600; color: rgba(255,255,255,.6);
  border-bottom: 3px solid transparent; cursor: pointer; transition: all .15s;
  display: flex; align-items: center; gap: 6px; white-space: nowrap;
}
.main-tab.active { color: #fff; border-bottom-color: #fff; }
.main-tab .badge {
  background: var(--red); color: #fff; font-size: 11px;
  border-radius: 10px; padding: 1px 6px;
}

/* ── 탭 콘텐츠 ── */
.page { display: none; flex: 1; flex-direction: column; }
.page.active { display: flex; }

/* ══════════════════════════════════
   이벤트 페이지
══════════════════════════════════ */
.event-center-select {
  border: 1px solid var(--gray2); border-radius: 6px; padding: 7px 12px;
  font-size: 14px; outline: none; background: var(--gray0); color: var(--text);
  margin-right: 8px; align-self: center;
}
.event-center-select:focus { border-color: var(--navy2); }
.event-toolbar {
  background: #fff; border-bottom: 1px solid var(--gray2);
  padding: 0 24px; display: flex; align-items: center; gap: 16px;
}
.sub-tabs { display: flex; }
.sub-tab {
  padding: 13px 16px; font-size: 14px; font-weight: 600; color: var(--gray4);
  border-bottom: 2px solid transparent; cursor: pointer; transition: all .15s;
}
.sub-tab.active { color: var(--navy); border-bottom-color: var(--navy); }
.sub-tab .badge {
  display: inline-block; background: var(--red); color: #fff;
  font-size: 11px; border-radius: 10px; padding: 1px 6px; margin-left: 5px;
}
.search-wrap { flex: 1; position: relative; }
.search-wrap input {
  width: 100%; border: 1px solid var(--gray2); border-radius: 20px;
  padding: 7px 16px 7px 36px; font-size: 14px; outline: none; background: var(--gray0);
}
.search-wrap input:focus { border-color: var(--navy2); background: #fff; }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--gray3); font-size: 14px; }

.event-list { flex: 1; }
.event-item {
  background: #fff; border-bottom: 1px solid var(--gray2);
  padding: 14px 24px; display: flex; align-items: center; gap: 14px;
  cursor: pointer; transition: background .1s;
}
.event-item:hover { background: #f0f4ff; }

.status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.status-dot.발생  { background: var(--red); }
.status-dot.조치중 { background: var(--yellow); }
.status-dot.완료  { background: var(--green); }

.event-meta { min-width: 160px; }
.event-center   { font-size: 13px; color: var(--navy); font-weight: 600; }
.event-facility { font-size: 12px; color: var(--gray4); margin-top: 2px; }
.event-body { flex: 1; }
.event-memo    { font-size: 14px; color: var(--text); }
.event-preview { font-size: 13px; color: var(--gray4); margin-top: 3px; }
.has-photo     { font-size: 11px; color: var(--navy2); margin-top: 3px; }
.event-right   { text-align: right; flex-shrink: 0; }
.event-date    { font-size: 12px; color: var(--gray4); }
.event-worker  { font-size: 12px; color: var(--gray3); margin-top: 2px; }
.status-badge {
  display: inline-block; font-size: 11px; font-weight: 700;
  padding: 2px 8px; border-radius: 10px; margin-top: 4px;
}
.status-badge.발생  { background: #fee2e2; color: var(--red); }
.status-badge.조치중 { background: #fef3c7; color: var(--yellow); }
.status-badge.완료  { background: #dcfce7; color: var(--green); }

/* ══════════════════════════════════
   엑셀/사진 공통
══════════════════════════════════ */
.filter-bar {
  background: #fff; border-bottom: 1px solid var(--gray2);
  padding: 12px 24px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
  position: sticky; top: 98px; z-index: 98;
}
.filter-bar label  { font-size: 13px; color: var(--gray4); }
.filter-bar select, .filter-bar input[type="date"] {
  border: 1px solid var(--gray2); border-radius: 6px; padding: 7px 12px;
  font-size: 14px; outline: none; background: var(--gray0); color: var(--text);
}
.filter-bar select:focus, .filter-bar input:focus { border-color: var(--navy2); }
.search-btn {
  background: var(--navy); color: #fff; border: none; border-radius: 6px;
  padding: 7px 18px; font-size: 14px; font-weight: 600; cursor: pointer;
}
.search-btn:hover { background: var(--navy2); }

/* 스피너 */
.spinner-wrap {
  display: none; flex-direction: column; align-items: center;
  justify-content: center; padding: 80px 24px; gap: 16px;
}
.spinner-wrap.show { display: flex; }
.spinner {
  width: 48px; height: 48px; border: 4px solid var(--gray2);
  border-top-color: var(--navy); border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.spinner-wrap p { font-size: 14px; color: var(--gray4); }

/* 엑셀 목록 */
.excel-group-header {
  padding: 10px 24px; background: var(--gray1);
  font-size: 13px; font-weight: 700; color: var(--gray5);
  border-bottom: 1px solid var(--gray2); border-top: 1px solid var(--gray2);
  position: sticky; top: 106px; z-index: 10;
}
.excel-item {
  background: #fff; border-bottom: 1px solid var(--gray2);
  padding: 14px 24px; display: flex; align-items: center; gap: 16px;
  transition: background .1s;
}
.excel-item:hover { background: #f0f4ff; }
.excel-icon { font-size: 28px; flex-shrink: 0; }
.excel-info { flex: 1; }
.excel-title  { font-size: 15px; font-weight: 600; color: var(--text); }
.excel-meta   { font-size: 13px; color: var(--gray4); margin-top: 3px; }
.excel-center { font-size: 12px; color: var(--navy); margin-top: 3px; font-weight: 600; }
.dl-btn {
  display: flex; align-items: center; gap: 6px;
  background: var(--green); color: #fff; border: none; border-radius: 6px;
  padding: 8px 16px; font-size: 13px; font-weight: 600;
  cursor: pointer; text-decoration: none; white-space: nowrap;
}
.dl-btn:hover { background: #15803d; }
.dl-btn:disabled { opacity: .6; cursor: wait; }

/* 사진 목록 */
.photo-group-header {
  padding: 10px 24px; background: var(--gray1);
  font-size: 13px; font-weight: 700; color: var(--gray5);
  border-bottom: 1px solid var(--gray2); border-top: 1px solid var(--gray2);
  position: sticky; top: 106px; z-index: 10;
  display: flex; justify-content: space-between; align-items: center;
}
.photo-group-body {
  background: #fff; padding: 16px 24px; border-bottom: 1px solid var(--gray2);
}
.photo-grid-dash {
  display: flex; flex-direction: column; gap: 0;
}
.photo-card { display: flex; flex-direction: row; align-items: center; gap: 12px; padding: 10px 16px; border-bottom: 1px solid var(--gray2); background: #fff; }
.photo-thumb-dash {
  width: 70px; height: 70px; object-fit: cover; flex-shrink: 0;
  border-radius: 8px; border: 1px solid var(--gray2);
  cursor: pointer; transition: opacity .15s;
}
.photo-thumb-dash:hover { opacity: .85; }
.photo-name     { font-size: 11px; color: var(--gray4); text-align: left; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.photo-facility { font-size: 13px; color: var(--navy); font-weight: 600; text-align: left; }
.photo-dl {
  display: flex; align-items: center; justify-content: center; gap: 4px;
  background: var(--blue); color: #fff; border: none; border-radius: 4px;
  padding: 4px 8px; font-size: 11px; cursor: pointer; text-decoration: none;
}
.photo-dl:hover { background: #1d4ed8; }

/* 빈 상태 */
.empty-state { text-align: center; padding: 80px 24px; color: var(--gray3); }
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }
.empty-state p { font-size: 15px; }

/* ══════════════════════════════════
   이벤트 팝업
══════════════════════════════════ */
.modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5);
  z-index: 200; align-items: flex-start; justify-content: center;
  padding: 40px 16px; overflow-y: auto;
}
.modal-overlay.open { display: flex; }
.modal {
  background: #fff; border-radius: 12px; width: 100%; max-width: 700px;
  box-shadow: 0 20px 60px rgba(0,0,0,.3); animation: slideUp .2s ease;
}
@keyframes slideUp {
  from { opacity:0; transform: translateY(20px); }
  to   { opacity:1; transform: translateY(0); }
}
.modal-header {
  padding: 20px 24px; border-bottom: 1px solid var(--gray2);
  display: flex; align-items: flex-start; gap: 12px;
}
.modal-header .status-dot { margin-top: 5px; width: 12px; height: 12px; }
.modal-title { flex: 1; }
.modal-title h2 { font-size: 18px; color: var(--text); line-height: 1.4; }
.modal-sub { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 8px; font-size: 13px; color: var(--gray4); }
.modal-sub span b { color: var(--gray5); font-weight: 600; }
.close-btn {
  background: none; border: none; font-size: 22px; color: var(--gray3);
  cursor: pointer; padding: 0 4px; flex-shrink: 0;
}
.close-btn:hover { color: var(--text); }
.photo-section { padding: 16px 24px 0; border-bottom: 1px solid var(--gray2); }
.photo-section h4 { font-size: 13px; color: var(--gray4); font-weight: 600; margin-bottom: 10px; }
.photo-grid { display: flex; gap: 10px; flex-wrap: wrap; padding-bottom: 16px; }
.photo-thumb {
  width: 100px; height: 80px; object-fit: cover; border-radius: 6px;
  border: 1px solid var(--gray2); cursor: pointer; transition: opacity .15s;
}
.photo-thumb:hover { opacity: .85; }
.photo-loading { font-size: 13px; color: var(--gray3); padding: 8px 0; }
.no-photo      { font-size: 13px; color: var(--gray3); padding: 0 0 16px; }
.timeline { padding: 20px 24px; }
.timeline-item { display: flex; gap: 14px; margin-bottom: 20px; }
.t-left { display: flex; flex-direction: column; align-items: center; }
.t-icon {
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0;
}
.t-icon.발생  { background: #fee2e2; }
.t-icon.조치중 { background: #fef3c7; }
.t-icon.완료  { background: #dcfce7; }
.t-line { width: 2px; flex: 1; background: var(--gray2); margin: 4px 0; }
.t-body { flex: 1; padding-top: 4px; }
.t-header { display: flex; gap: 8px; align-items: center; margin-bottom: 6px; flex-wrap: wrap; }
.t-type { font-size: 12px; font-weight: 700; }
.t-type.발생  { color: var(--red); }
.t-type.조치중 { color: var(--yellow); }
.t-type.완료  { color: var(--green); }
.t-by { font-size: 12px; color: var(--gray4); }
.t-at { font-size: 12px; color: var(--gray3); margin-left: auto; }
.t-text {
  font-size: 14px; color: var(--text); background: var(--gray0);
  border-radius: 8px; padding: 10px 14px; line-height: 1.6; border: 1px solid var(--gray2);
}
.modal-action {
  padding: 16px 24px; border-top: 1px solid var(--gray2);
  background: var(--gray0); border-radius: 0 0 12px 12px;
}
.modal-action textarea {
  width: 100%; border: 1px solid var(--gray2); border-radius: 8px;
  padding: 10px 14px; font-size: 14px; font-family: inherit;
  resize: vertical; min-height: 80px; outline: none; background: #fff;
}
.modal-action textarea:focus { border-color: var(--navy2); }
.action-btns { display: flex; gap: 10px; margin-top: 10px; }
.btn { padding: 10px 20px; border-radius: 6px; font-size: 14px; font-weight: 600; border: none; cursor: pointer; }
.btn-action { background: var(--yellow); color: #fff; }
.btn-action:hover { background: #b45309; }
.btn-done { background: var(--green); color: #fff; }
.btn-done:hover { background: #15803d; }
.completed-msg { text-align: center; padding: 16px; color: var(--green); font-weight: 600; }

/* ── 페이지네이션 ── */
.pagination { display: flex; justify-content: center; gap: 6px; padding: 16px; flex-wrap: wrap; }
.page-btn { min-width: 34px; height: 34px; border: 1px solid var(--gray2); border-radius: 6px; background: #fff; color: var(--navy); font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.page-btn.active { background: var(--navy); color: #fff; border-color: var(--navy); font-weight: 700; }
.page-btn:hover:not(.active) { background: var(--gray1); }

/* 사진 뷰어 */
.viewer-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.92);
  z-index: 300; flex-direction: column; align-items: center; justify-content: center;
}
.viewer-overlay.open { display: flex; }
.viewer-img  { max-width: 90vw; max-height: 85vh; border-radius: 8px; }
.viewer-info { color: rgba(255,255,255,.7); font-size: 13px; margin-top: 12px; }
.viewer-close {
  position: absolute; top: 20px; right: 20px; background: none;
  border: none; color: #fff; font-size: 32px; cursor: pointer;
}
.viewer-dl {
  position: absolute; top: 20px; left: 20px;
  background: var(--blue); color: #fff; border: none; border-radius: 6px;
  padding: 8px 16px; font-size: 13px; font-weight: 600; text-decoration: none; cursor: pointer;
}

/* ══════════════════════════════════
   보고서 페이지
══════════════════════════════════ */
.report-wrap {
  max-width: 600px; margin: 40px auto; padding: 0 24px;
}
.report-card {
  background: #fff; border-radius: 12px; padding: 28px;
  box-shadow: 0 2px 12px rgba(0,0,0,.08); margin-bottom: 20px;
}
.report-card h3 {
  font-size: 16px; font-weight: 700; color: var(--navy);
  margin-bottom: 6px; display: flex; align-items: center; gap: 8px;
}
.report-card p {
  font-size: 13px; color: var(--gray4); margin-bottom: 20px; line-height: 1.6;
}
.report-filters { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
.report-filters label { font-size: 12px; color: var(--gray4); font-weight: 600; margin-bottom: 4px; display: block; }
.report-filters select,
.report-filters input[type="date"] {
  width: 100%; border: 1px solid var(--gray2); border-radius: 6px;
  padding: 9px 12px; font-size: 14px; outline: none;
  background: var(--gray0); color: var(--text);
}
.report-filters select:focus,
.report-filters input:focus { border-color: var(--navy2); }
.report-row { display: flex; gap: 12px; }
.report-row > div { flex: 1; }
.report-dl-btn {
  width: 100%; background: var(--green); color: #fff; border: none;
  border-radius: 8px; padding: 13px; font-size: 15px; font-weight: 700;
  cursor: not-allowed; opacity: 0.5;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.coming-soon {
  text-align: center; padding: 12px;
  font-size: 12px; color: var(--gray3);
  background: var(--gray1); border-radius: 6px; margin-top: 10px;
}

@media (max-width: 600px) {
  .event-meta { min-width: unset; }
  .modal { border-radius: 12px 12px 0 0; }
  .modal-overlay { padding: 60px 0 0; align-items: flex-end; }
  .photo-grid-dash { flex-direction: column; }
}
</style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<!-- 로그인 -->
<div id="login-screen">
  <div class="login-box">
    <div class="logo">📝</div>
    <h1>M-Event</h1>
    <p>로그인</p>
    <label>이름</label>
    <input type="text" id="login-name" placeholder="홍길동" autocomplete="name">
    <label>전화번호</label>
    <input type="tel" id="login-phone" placeholder="01012345678" autocomplete="tel">
    <button class="login-btn" onclick="login()">로그인</button>
    <p class="login-error" id="login-error"></p>
  </div>
</div>

<!-- 앱 -->
<div id="app">
  <div class="header">
    <h1>📝 M-Event</h1>
    <span class="user" id="header-user"></span>
    <button class="hidden-logout-btn" onclick="logout()">
      <i class="fa-solid fa-right-from-bracket"></i>
      <span>로그아웃</span>
    </button>
  </div>

  <!-- 메인 탭 -->
  <div class="main-tabs">
    <div class="main-tab active" data-page="event" onclick="switchPage('event')">
      <i class="fa-solid fa-bell"></i> 이벤트 <span class="badge" id="badge-active">0</span>
    </div>
    <div class="main-tab" data-page="excel" onclick="switchPage('excel')"><i class="fa-solid fa-file-excel"></i> 엑 셀</div>
    <div class="main-tab" data-page="photo" onclick="switchPage('photo')"><i class="fa-solid fa-camera"></i> 사 진</div>
    <div class="main-tab" data-page="report" onclick="switchPage('report')" id="tab-report" style="display:none"><i class="fa-solid fa-file-lines"></i> 보고서</div>
  </div>

  <!-- ── 이벤트 페이지 ── -->
  <div class="page active" id="page-event">
    <div class="event-toolbar">
      <div class="sub-tabs">
        <select id="filter-center-event" class="event-center-select" style="display:none;" onchange="subscribeEvents()"></select>
        <div class="sub-tab active" data-tab="진행중" onclick="switchEventTab('진행중')">
          진행중 <span class="badge" id="badge-active2">0</span>
        </div>
        <div class="sub-tab" data-tab="완료" onclick="switchEventTab('완료')">완료</div>
      </div>
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-input" placeholder="설비, 내용, 점검자 검색..." oninput="renderList()">

  <img id="event-viewer-img" src="" style="max-width:90vw;max-height:90vh;border-radius:8px;">

<script>
// ── Firebase ──
const firebaseConfig = {
  apiKey:            "AIzaSyCgSuudB0Fax1ONAYHJwwYv99nhGAHIbO0",
  authDomain:        "m-smart-90148.firebaseapp.com",
  projectId:         "m-smart-90148",
  storageBucket:     "m-smart-90148.firebasestorage.app",
  messagingSenderId: "267082158406",
  appId:             "1:267082158406:web:eba0f68dde60931aea9547",
};
firebase.initializeApp(firebaseConfig);
const db      = firebase.firestore();
const storage = firebase.storage();

// ── 상태 ──
const DASHBOARD_API = "https://facility-dashboard-267082158406.asia-northeast3.run.app";
let currentUser  = null;
let allEvents    = [];
let fidLocations = {};
let sheetLabels  = {};
let eventTab     = "진행중";
let currentPage  = "event";
let currentEvent = null;
let unsubscribe  = null;

// ──────────────────────────────────────────────
// 로그인
// ──────────────────────────────────────────────
async function login() {
  const name  = document.getElementById("login-name").value.trim();
  const phone = document.getElementById("login-phone").value.replace(/[^0-9]/g, "");
  const errEl = document.getElementById("login-error");
  errEl.textContent = "";
  if (!name || !phone) { errEl.textContent = "이름과 전화번호를 입력하세요."; return; }
  try {
    const snap = await db.collection("UserDB").where("name","==",name).limit(5).get();
    if (snap.empty) { errEl.textContent = "등록되지 않은 이름입니다."; return; }
    const matched = snap.docs.find(d => {
      const p = (d.data().phone || "").replace(/[^0-9]/g,"");
      return p === phone;
    });
    if (!matched) { errEl.textContent = "전화번호가 일치하지 않습니다."; return; }
    currentUser = matched.data();
    sessionStorage.setItem("m_user", JSON.stringify(currentUser));
    showApp();
  } catch(e) { errEl.textContent = "로그인 중 오류가 발생했습니다."; }
}

function logout() {
  if (unsubscribe) unsubscribe();
  currentUser = null; allEvents = [];
  sessionStorage.removeItem("m_user");
  document.getElementById("app").style.display          = "none";
  document.getElementById("login-screen").style.display = "flex";
}

window.onload = () => {
  const saved = sessionStorage.getItem("m_user");
  if (saved) { currentUser = JSON.parse(saved); showApp(); }
  const today    = new Date();
  const firstDay = new Date(today.getFullYear(), today.getMonth(), 1);
  ["excel","photo","report"].forEach(k => {
    document.getElementById(`filter-start-${k}`).value = fmt(firstDay);
    document.getElementById(`filter-end-${k}`).value   = fmt(today);
  });
};
document.addEventListener("keydown", e => {
  if (e.key==="Enter" && document.getElementById("login-screen").style.display!=="none") login();
});

// ──────────────────────────────────────────────
// 앱 초기화
// ──────────────────────────────────────────────
async function loadFidLocations(centerOverride) {
  try {
    const center = centerOverride || (currentUser.center_name === "Master" ? "" : currentUser.center_name);
    if (!center) return;
    const res = await fetch(`${DASHBOARD_API}/api/fidlocations?center=${encodeURIComponent(center)}`);
    const data = await res.json();
    if (data.ok) { fidLocations = data.fidLocations || {}; sheetLabels = data.sheetLabels || {}; }
  } catch(e) { console.warn("fidLocations 로드 실패:", e); }
}

async function showApp() {
  document.getElementById("login-screen").style.display = "none";
  document.getElementById("app").style.display          = "flex";
  const centerLabel = currentUser.center_name === "Master" ? "마스터 (전체)" : currentUser.center_name;
  document.getElementById("header-user").textContent = `${currentUser.name} · ${centerLabel}`;

  // 보고서 탭 관리자/Master만 표시
  const isAdminOrMaster = currentUser.active === true || currentUser.center_name === "Master";
  document.getElementById("tab-report").style.display = isAdminOrMaster ? "flex" : "none";

  await buildCenterFilters();
  loadFidLocations();
  subscribeEvents();
}

async function buildCenterFilters() {
  const isMaster = currentUser.center_name === "Master";

  // 센터 목록 조회
  let centers = [];
  try {
    const doc = await db.collection("settings").doc("all_centers").get();
    if (doc.exists) centers = (doc.data().centers || []).sort();
  } catch(e) { console.warn("센터 목록 조회 실패:", e); }

  // 이벤트 탭 센터 드롭다운
  const eventSel = document.getElementById("filter-center-event");
  eventSel.style.display = "block";
  if (isMaster) {
    eventSel.disabled = false;
    eventSel.innerHTML = `<option value="">전체</option>` +
      centers.map(c => `<option value="${esc(c)}">${esc(c)}</option>`).join("");
  } else {
    eventSel.innerHTML = `<option value="${esc(currentUser.center_name)}">${esc(currentUser.center_name)}</option>`;
    eventSel.disabled = true;
  }

  for (const k of ["excel","photo","report"]) {
    const sel = document.getElementById(`filter-center-${k}`);
    if (!isMaster) {
      sel.innerHTML = `<option value="${esc(currentUser.center_name)}">${esc(currentUser.center_name)}</option>`;
      sel.disabled = true;
    } else {
      sel.disabled = false;
      sel.innerHTML = `<option value="">전체</option>` +
        centers.map(c => `<option value="${esc(c)}">${esc(c)}</option>`).join("");
    }
  }
}

// ──────────────────────────────────────────────
// 페이지 전환 (이벤트 / 엑셀 / 사진)
// ──────────────────────────────────────────────
function switchPage(page) {
  currentPage = page;
  document.querySelectorAll(".main-tab").forEach(el =>
    el.classList.toggle("active", el.dataset.page === page));
  document.querySelectorAll(".page").forEach(el =>
    el.classList.toggle("active", el.id === `page-${page}`));
}

// ──────────────────────────────────────────────
// 이벤트 탭
// ──────────────────────────────────────────────
function subscribeEvents() {
  if (unsubscribe) unsubscribe();

  // 90일 전 날짜 계산
  const ninetyDaysAgo = new Date();
  ninetyDaysAgo.setDate(ninetyDaysAgo.getDate() - 90);
  const cutoff = firebase.firestore.Timestamp.fromDate(ninetyDaysAgo);

  const selectedCenter = document.getElementById("filter-center-event")?.value || "";

  // Master가 센터 선택하면 해당 센터 sheetLabels 로드 후 재렌더링
  if (currentUser.center_name === "Master" && selectedCenter) {
    loadFidLocations(selectedCenter).then(() => renderList());
  }

  let q = db.collection("events")
    .orderBy("created_at", "desc")
    .where("created_at", ">=", cutoff);

  if (currentUser.center_name !== "Master") {
    q = q.where("center_name", "==", currentUser.center_name);
  } else if (selectedCenter) {
    q = q.where("center_name", "==", selectedCenter);
  }

  unsubscribe = q.onSnapshot(snap => {
    allEvents = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderList();
    updateBadge();
  });
}

function switchEventTab(tab) {
  eventTab = tab;
  document.querySelectorAll(".sub-tab").forEach(el =>
    el.classList.toggle("active", el.dataset.tab === tab));
  renderList();
}

function renderList() {
  const keyword  = document.getElementById("search-input").value.toLowerCase();
  const isActive = eventTab === "진행중";
  const filtered = allEvents.filter(ev => {
    const matchTab = isActive ? ev.status !== "완료" : ev.status === "완료";
    if (!matchTab) return false;
    if (!keyword) return true;
    const firstFid = (ev.facility_id||"").split(",")[0].trim();
    const fidLabel = sheetLabels[firstFid] || "";
    return [ev.memo, ev.facility_id, ev.fid_name, fidLabel, ev.worker, ev.center_name]
      .some(v => (v||"").toLowerCase().includes(keyword));
  });
  const el = document.getElementById("event-list");
  if (filtered.length === 0) {
    el.innerHTML = `<div class="empty-state">
      <div class="icon">${isActive ? "✅" : "📭"}</div>
      <p>${isActive ? "진행 중인 이벤트가 없습니다." : "완료된 이벤트가 없습니다."}</p>
    </div>`;
    return;
  }
  const total = filtered.length;
  const paged = filtered.slice((eventPage-1)*PAGE_SIZE, eventPage*PAGE_SIZE);
  el.innerHTML = paged.map(ev => {
    const lastAction = (ev.history||[]).slice(-1)[0];
    const hasPhoto   = ev.photo_count > 0;
    return `
    <div class="event-item" onclick="openModal('${ev.id}')">
      <div class="status-dot ${ev.status}"></div>
      <div class="event-meta">
        <div class="event-center">${esc(ev.center_name||"")}</div>
        <div class="event-facility">${esc(ev.fid_name||ev.facility_id||"")}</div>
      </div>
      <div class="event-body">
        <div class="event-memo">${esc(ev.memo||"")}</div>
        ${lastAction && lastAction.type !== "발생" ? `<div class="event-preview">↳ ${esc(lastAction.content||"")}</div>` : ""}
        ${hasPhoto ? `<div class="has-photo">📷 사진 ${ev.photo_count}장</div>` : ""}
      </div>
      <div class="event-right">
        <div class="event-date">${fmtDate(ev.created_at)}</div>
        <div class="event-worker">${esc(ev.worker||"")}</div>
        <span class="status-badge ${ev.status}">${ev.status}</span>
      </div>
    </div>`;
  }).join("");
  renderPagination("pagination-event", total, eventPage, "goEventPage");
}
function goEventPage(p) { eventPage = p; renderList(); window.scrollTo(0,0); }

function updateBadge() {
  const count = allEvents.filter(e => e.status !== "완료").length;
  document.getElementById("badge-active").textContent  = count;
  document.getElementById("badge-active2").textContent = count;
}

// ──────────────────────────────────────────────
// 이벤트 팝업
// ──────────────────────────────────────────────
function openModal(eventId) {
  currentEvent = allEvents.find(e => e.id === eventId);
  if (!currentEvent) return;
  const isDone = currentEvent.status === "완료";
  document.getElementById("modal-dot").className        = `status-dot ${currentEvent.status}`;
  document.getElementById("modal-title-text").textContent = currentEvent.memo || "";
  document.getElementById("m-center").textContent       = currentEvent.center_name  || "";
  document.getElementById("m-facility").textContent     = currentEvent.fid_name || currentEvent.facility_id  || "";
  document.getElementById("m-worker").textContent       = currentEvent.worker        || "";
  document.getElementById("m-datetime").textContent     = currentEvent.datetime      || "";
  loadEventPhotos(currentEvent);
  const icons   = { "발생":"🔴","조치중":"🟡","완료":"🟢" };
  const history = currentEvent.history || [];
  document.getElementById("modal-timeline").innerHTML = history.map((h,i) => `
    <div class="timeline-item">
      <div class="t-left">
        <div class="t-icon ${h.type}">${icons[h.type]||"⚪"}</div>
        ${i < history.length-1 ? '<div class="t-line"></div>' : ""}
      </div>
      <div class="t-body">
        <div class="t-header">
          <span class="t-type ${h.type}">${h.type}</span>
          <span class="t-by">${esc(h.by||"")}</span>
          <span class="t-at">${fmtDate(h.at)}</span>
        </div>
        <div class="t-text">${esc(h.content||"")}</div>
      </div>
    </div>`).join("");
  document.getElementById("modal-action").innerHTML = isDone
    ? `<div class="completed-msg">🟢 이 이벤트는 완료 처리되었습니다.</div>`
    : `<textarea id="action-text" placeholder="조치사항 또는 완료 내용을 입력하세요..."></textarea>
       <div class="action-btns">
         <button class="btn btn-action" onclick="submitAction('조치중')">🟡 조치 진행</button>
         <button class="btn btn-done"   onclick="submitAction('완료')">🟢 완료 처리</button>
       </div>`;
  document.getElementById("modal-overlay").classList.add("open");
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById("modal-overlay")) closeModal();
}
function closeModal() {
  document.getElementById("modal-overlay").classList.remove("open");
  currentEvent = null;
}

async function submitAction(type) {
  const content = (document.getElementById("action-text")?.value||"").trim();
  if (!content) { alert("내용을 입력하세요."); return; }
  if (!currentEvent) return;
  try {
    await db.collection("events").doc(currentEvent.id).update({
      status:           type,
      history:          firebase.firestore.FieldValue.arrayUnion({
        type, content, by: currentUser.name||"", at: firebase.firestore.Timestamp.now(),
      }),
      last_notified_at: firebase.firestore.Timestamp.now(),
      updated_at:       firebase.firestore.FieldValue.serverTimestamp(),
      ...(type==="완료" ? { completed_at: firebase.firestore.FieldValue.serverTimestamp() } : {}),
    });
    closeModal();
  } catch(e) { alert("처리 중 오류가 발생했습니다."); }
}

async function loadEventPhotos(ev) {
  const grid = document.getElementById("photo-grid");
  const sec  = document.getElementById("photo-section");

  // events에 photos URL이 있으면 바로 사용
  const photoUrls = (ev.photos || "").split(",").map(s => s.trim()).filter(Boolean);
  if (photoUrls.length > 0) {
    sec.style.display = "block";
    grid.innerHTML = photoUrls.map(url => `
      <div>
        <img class="photo-thumb" src="${url}" alt="사진"
             onclick="openEventViewer('${url}')">
      </div>`).join("");
    return;
  }

  // photos URL 없으면 파일명 패턴으로 Storage에서 조회
  const count = parseInt((ev.photo_count||"0").replace(/[^0-9]/g,""));
  if (count === 0) { sec.style.display = "none"; return; }
  sec.style.display = "block";
  grid.innerHTML = `<div class="photo-loading"><div style="width:32px;height:32px;border:3px solid var(--gray2);border-top-color:var(--navy);border-radius:50%;animation:spin .8s linear infinite;display:inline-block;margin-right:8px;vertical-align:middle"></div>사진 불러오는 중...</div>`;
  const dt         = (ev.datetime||"").replace(/[-: ]/g,"").slice(0,12);
  const facilityId = (ev.facility_id||"").replace(/\s/g,"_");
  const urls = [];
  for (let i = 1; i <= Math.min(count,3); i++) {
    const fileName = `${dt.slice(0,8)}_${dt.slice(8,12)}_${facilityId}_${i}.jpg`;
    try {
      const url = await storage.ref(`inspection_photos/${ev.center_name}/${fileName}`).getDownloadURL();
      urls.push({ url, fileName, facilityId: ev.facility_id });
    } catch(e) { console.warn("사진 로드 실패:", fileName); }
  }
  if (urls.length === 0) { grid.innerHTML = `<div class="no-photo">사진을 불러올 수 없습니다.</div>`; return; }
  grid.innerHTML = urls.map(({ url, fileName, facilityId }) => `
    <div>
      <img class="photo-thumb" src="${url}" alt="${esc(facilityId)}"
           onclick="openEventViewer('${url}')" title="${esc(fileName)}">
      <div style="font-size:11px;color:var(--gray4);text-align:center;margin-top:4px">${esc(facilityId)}</div>
    </div>`).join("");
}

function openEventViewer(url) {
  document.getElementById("event-viewer-img").src = url;
  const v = document.getElementById("photo-viewer");
  v.style.display = "flex";
}
function closeEventViewer() {
  document.getElementById("photo-viewer").style.display = "none";
  document.getElementById("event-viewer-img").src = "";
}

// ──────────────────────────────────────────────
// 엑셀 로드
// ──────────────────────────────────────────────
async function loadExcel() {
  const center = document.getElementById("filter-center-excel").value || (currentUser.center_name !== "Master" ? currentUser.center_name : "");

  // Master가 센터 선택하면 해당 센터 sheetLabels 로드
  if (currentUser.center_name === "Master" && center) {
    await loadFidLocations(center);
  }
  const start  = document.getElementById("filter-start-excel").value;
  const end    = document.getElementById("filter-end-excel").value;

  // 90일 초과 체크
  if (start && end) {
    const diff = (new Date(end) - new Date(start)) / (1000 * 60 * 60 * 24);
    if (diff > 90) {
      alert("조회 기간은 최대 90일까지 가능합니다.");
      return;
    }
  }
  const el     = document.getElementById("excel-list");
  const sp     = document.getElementById("spinner-excel");
  el.innerHTML = ""; sp.classList.add("show");
  try {
    let q = db.collection("Maxerve_Excel").orderBy("datetime","desc");
    if (center) q = q.where("center_name","==",center);
    if (start)  q = q.where("datetime",">=",start);
    if (end)    q = q.where("datetime","<=",end+"\uffff");
    const snap = await q.get();
    sp.classList.remove("show");
    if (snap.empty) { el.innerHTML = `<div class="empty-state"><div class="icon"><i class="fa-solid fa-file-excel" style="color:#217346;font-size:2rem;"></i></div><p>해당 기간에 엑셀 파일이 없습니다.</p></div>`; return; }
    const groups = {};
    snap.docs.forEach(d => {
      const data    = d.data();
      const dateKey = (data.datetime||"").slice(0,7);
      if (!groups[dateKey]) groups[dateKey] = [];
      groups[dateKey].push({ id: d.id, ...data });
    });
    let html = "";
    Object.keys(groups).sort().reverse().forEach(month => {
      const [y,m] = month.split("-");
      html += `<div class="excel-group-header">📅 ${y}년 ${parseInt(m)}월 (${groups[month].length}건)</div>`;
      groups[month].forEach(item => {
        html += `
        <div class="excel-item">
          <div class="excel-icon"><i class="fa-solid fa-file-excel" style="color:#217346;font-size:2rem;"></i></div>
          <div class="excel-info">
            <div class="excel-title">${(()=>{ const f=(item.facility_id||"").split(",")[0].trim(); return esc(sheetLabels[f]||fidLocations[f]||item.facility_id||"점검표"); })()}</div>
            <div class="excel-meta">날짜: ${esc(item.datetime||"")}</div>
            <div class="excel-center">${esc(item.center_name||"")}</div>
          </div>
          <button class="dl-btn"
                  data-storage-path="${esc(item.storage_path||"")}"
                  data-legacy-url="${esc(item.file_url||"")}"
                  onclick="downloadExcel(this)">⬇ 다운로드</button>
        </div>`;
      });
    });
    el.innerHTML = html;
    renderPagination("pagination-excel", Object.keys(groups).length, excelPage, "goExcelPage");
  } catch(e) {
    sp.classList.remove("show");
    console.error(e);
    el.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>데이터를 불러오는 중 오류가 발생했습니다.</p></div>`;
  }
}
function goExcelPage(p) { excelPage = p; loadExcel(); window.scrollTo(0,0); }

// [신규] storage_path가 있으면 클릭 시점에 매번 새 다운로드 URL을 발급받는다 (만료 없음).
// storage_path가 없는 예전 문서는 저장돼 있던 file_url(만료됐을 수 있음)로 폴백.
async function downloadExcel(btn) {
  const storagePath = btn.dataset.storagePath;
  const legacyUrl    = btn.dataset.legacyUrl;

  if (!storagePath) {
    if (!legacyUrl) { alert("다운로드 링크를 찾을 수 없습니다."); return; }
    window.open(legacyUrl, "_blank");
    return;
  }

  const originalText = btn.textContent;
  btn.disabled = true;
  btn.textContent = "불러오는 중...";
  try {
    const url = await storage.ref(storagePath).getDownloadURL();
    window.open(url, "_blank");
  } catch (e) {
    console.error("다운로드 URL 발급 실패:", e);
    alert("파일을 찾을 수 없거나 접근 권한이 없습니다.");
  } finally {
    btn.disabled = false;
    btn.textContent = originalText;
  }
}

// ──────────────────────────────────────────────
// 사진 로드
// ──────────────────────────────────────────────
async function loadDashPhotos() {
  const center = document.getElementById("filter-center-photo").value || (currentUser.center_name !== "Master" ? currentUser.center_name : "");

  // Master가 센터 선택하면 해당 센터 sheetLabels 로드
  if (currentUser.center_name === "Master" && center) {
    await loadFidLocations(center);
  }
  const start  = document.getElementById("filter-start-photo").value;
  const end    = document.getElementById("filter-end-photo").value;

  // 90일 초과 체크
  if (start && end) {
    const diff = (new Date(end) - new Date(start)) / (1000 * 60 * 60 * 24);
    if (diff > 90) {
      alert("조회 기간은 최대 90일까지 가능합니다.");
      return;
    }
  }
  const el     = document.getElementById("photo-list");
  const sp     = document.getElementById("spinner-photo");
  el.innerHTML = ""; sp.classList.add("show");
  try {
    let q = db.collection("inspection_logs").orderBy("datetime","desc");
    if (center) q = q.where("center_name","==",center);
    const snap = await q.get();
    const filtered = snap.docs.filter(d => {
      const data  = d.data();
      const count = parseInt((data.photo_count||"0").replace(/[^0-9]/g,""));
      if (count <= 0) return false;
      const dt = (data.datetime||"").slice(0,10);
      if (start && dt < start) return false;
      if (end   && dt > end)   return false;
      return true;
    });
    sp.classList.remove("show");
    if (filtered.length === 0) { el.innerHTML = `<div class="empty-state"><div class="icon">📷</div><p>해당 기간에 사진이 없습니다.</p></div>`; return; }
    const groups = {};
    filtered.forEach(d => {
      const data    = d.data();
      const dateKey = (data.datetime||"").slice(0,10);
      if (!groups[dateKey]) groups[dateKey] = [];
      groups[dateKey].push({ id: d.id, ...data });
    });
    let html = "";
    Object.keys(groups).sort().reverse().forEach(date => {
      const items       = groups[date];
      const totalPhotos = items.reduce((s,i) => s + parseInt((i.photo_count||"0").replace(/[^0-9]/g,"")), 0);
      html += `
        <div class="photo-group-header">
          <span>📅 ${date} (${items.length}건 · 사진 ${totalPhotos}장)</span>
          <span style="font-size:12px;color:var(--gray4)">${esc(items[0]?.center_name||"")}</span>
        </div>
        <div class="photo-group-body">
          <div class="photo-grid-dash" id="pgrid-${date}">
            <div style="color:var(--gray3);font-size:13px;display:flex;align-items:center;gap:8px">
              <div style="width:32px;height:32px;border:3px solid var(--gray2);border-top-color:var(--navy);border-radius:50%;animation:spin .8s linear infinite"></div>로드 중...
            </div>
          </div>
        </div>`;
    });
    el.innerHTML = html;
    for (const [date, items] of Object.entries(groups)) loadPhotoGroup(date, items);
  } catch(e) {
    sp.classList.remove("show");
    console.error(e);
    el.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>오류가 발생했습니다.</p></div>`;
  }
}

async function loadPhotoGroup(date, items) {
  const grid = document.getElementById(`pgrid-${date}`);
  if (!grid) return;
  const cards = [];
  for (const item of items) {
    const count      = parseInt((item.photo_count||"0").replace(/[^0-9]/g,""));
    const facilityId = (item.facility_id||"").replace(/\s/g,"_");
    const dt         = (item.datetime||"").replace(/[-: ]/g,"").slice(0,12);
    for (let i = 1; i <= Math.min(count,3); i++) {
      const fileName = `${dt.slice(0,8)}_${dt.slice(8,12)}_${facilityId}_${i}.jpg`;
      try {
        const url = await storage.ref(`inspection_photos/${item.center_name}/${fileName}`).getDownloadURL();
        cards.push({ url, fileName, facilityId: item.facility_id, fid_name: item.fid_name||item.facility_id, datetime: item.datetime });
      } catch(e) { if (e.code !== "storage/object-not-found") console.warn(fileName, e.code); }
    }
  }
  if (cards.length === 0) { grid.innerHTML = `<div style="color:var(--gray3);font-size:13px">사진을 불러올 수 없습니다.</div>`; return; }
  grid.innerHTML = cards.map(({ url, fileName, facilityId, fid_name, datetime }) => `
    <div class="photo-card">
      <img class="photo-thumb-dash" src="${url}" alt="${esc(fid_name||facilityId)}"
           onclick="openViewer('${url}','${esc(fileName)}','${esc(fid_name||facilityId)}')"
           onerror="this.style.display='none'">
      <div style="flex:1;min-width:0;">
        <div class="photo-facility">${esc(sheetLabels[facilityId]||fidLocations[facilityId]||fid_name||facilityId)}</div>
        <div class="photo-name">${esc(datetime||"")}</div>
      </div>
      <a class="photo-dl" href="${url}" download="${esc(fileName)}" target="_blank">⬇ 다운로드</a>
    </div>`).join("");
}

function goPhotoPage(p) { photoPage = p; loadDashPhotos(); window.scrollTo(0,0); }

function openViewer(url, fileName, facilityId) {
  document.getElementById("viewer-img").src     = url;
  document.getElementById("viewer-dl").href     = url;
  document.getElementById("viewer-dl").download = fileName;
  document.getElementById("viewer-info").textContent = `${facilityId} · ${fileName}`;
  document.getElementById("viewer").classList.add("open");
}
function handleViewerClick(e) { if (e.target===document.getElementById("viewer")) closeViewer(); }
function closeViewer() {
  document.getElementById("viewer").classList.remove("open");
  document.getElementById("viewer-img").src = "";
}

// ── 페이지네이션 ──
const PAGE_SIZE = 30;
let eventPage = 1, excelPage = 1, photoPage = 1;

function renderPagination(containerId, total, current, onPageClick) {
  const el = document.getElementById(containerId);
  if (!el) return;
  const totalPages = Math.ceil(total / PAGE_SIZE);
  if (totalPages <= 1) { el.innerHTML = ""; return; }
  let html = "";
  if (current > 1) html += `<button class="page-btn" onclick="${onPageClick}(${current-1})">‹</button>`;
  for (let i = 1; i <= totalPages; i++) {
    if (i === 1 || i === totalPages || Math.abs(i - current) <= 2) {
      html += `<button class="page-btn${i===current?" active":""}" onclick="${onPageClick}(${i})">${i}</button>`;
    } else if (Math.abs(i - current) === 3) {
      html += `<span style="padding:0 4px">...</span>`;
    }
  }
  if (current < totalPages) html += `<button class="page-btn" onclick="${onPageClick}(${current+1})">›</button>`;
  el.innerHTML = html;
}

// ── 유틸 ──
function fmt(d) {
  const p = n => String(n).padStart(2,"0");
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;
}
function fmtDate(ts) {
  if (!ts) return "";
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  const p = n => String(n).padStart(2,"0");
  return `${d.getFullYear()}.${p(d.getMonth()+1)}.${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
}
function esc(s) {
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
